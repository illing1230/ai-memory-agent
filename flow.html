<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  .container {
    width: 420px;
    background: #FAFBFC;
    border: 1.5px solid #E0E0E0;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .title {
    font-size: 11px;
    font-weight: 700;
    color: #1A1A1A;
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: -0.3px;
  }
  .flow {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }
  .step-box {
    flex: 1;
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 6px;
    padding: 5px 9px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .step-label {
    font-size: 10px;
    font-weight: 700;
    color: #1E293B;
    letter-spacing: -0.3px;
  }
  .step-detail {
    font-size: 8px;
    color: #64748B;
    text-align: right;
    letter-spacing: -0.3px;
  }
  .arrow {
    text-align: center;
    color: #94A3B8;
    font-size: 10px;
    line-height: 1;
    padding-left: 6px;
  }
  .sub-steps {
    margin-left: 28px;
    border-left: 2px solid #E2E8F0;
    padding-left: 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .sub-step {
    background: #fff;
    border: 1px solid #E8ECF2;
    border-radius: 5px;
    padding: 4px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sub-label {
    font-size: 9px;
    font-weight: 600;
    color: #334155;
    letter-spacing: -0.3px;
  }
  .sub-detail {
    font-size: 7.5px;
    color: #94A3B8;
    letter-spacing: -0.3px;
  }
  .tag {
    display: inline-block;
    font-size: 7px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
  }
  .tag-blue { background: #DBEAFE; color: #2563EB; }
  .tag-green { background: #D1FAE5; color: #059669; }
  .tag-orange { background: #FEF3C7; color: #D97706; }
  .tag-red { background: #FEE2E2; color: #DC2626; }
  .tag-purple { background: #EDE9FE; color: #7C3AED; }

  .c-blue { background: #2563EB; }
  .c-green { background: #059669; }
  .c-orange { background: #D97706; }
  .c-purple { background: #7C3AED; }
  .c-red { background: #DC2626; }
</style>
</head>
<body>
<div class="container">
  <div class="title">AI Memory 저장 파이프라인</div>
  <div class="flow">

    <!-- Step 1 -->
    <div class="step">
      <div class="step-num c-blue">1</div>
      <div class="step-box">
        <span class="step-label">대화 수집</span>
        <span class="step-detail">최근 N개 메시지 필터링 (최대 6,000자)</span>
      </div>
    </div>
    <div class="arrow">↓</div>

    <!-- Step 2 -->
    <div class="step">
      <div class="step-num c-blue">2</div>
      <div class="step-box">
        <span class="step-label">LLM 메모리 추출</span>
        <span class="step-detail">카테고리 · 중요도 · 엔티티 자동 분류</span>
      </div>
    </div>
    <div class="arrow">↓</div>

    <!-- Step 3 -->
    <div class="step">
      <div class="step-num c-green">3</div>
      <div class="step-box">
        <span class="step-label">중복·충돌 검증</span>
        <span class="step-detail">벡터 유사도 0.93+ &amp; Jaccard 85%+</span>
      </div>
    </div>
    <div class="arrow">↓</div>

    <!-- Step 4: 저장 (sub-steps) -->
    <div class="step">
      <div class="step-num c-purple">4</div>
      <div class="step-box">
        <span class="step-label">동시 저장</span>
        <span class="step-detail">3중 구조로 저장</span>
      </div>
    </div>
    <div class="sub-steps">
      <div class="sub-step">
        <span class="sub-label">원문 메시지 </span>
        <span class="sub-detail">메타데이터 · 카테고리 · 중요도</span>
      </div>
      <div class="sub-step">
        <span class="sub-label">벡터 임베딩 </span>
        <span class="sub-detail">의미 기반 유사도 검색용</span>
      </div>
      <div class="sub-step">
        <span class="sub-label">Entity 관계 </span>
        <span class="sub-detail">Entity 연결</span>
      </div>
    </div>

  </div>
</div>
</body>
</html>
